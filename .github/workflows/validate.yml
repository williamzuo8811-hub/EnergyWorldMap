name: validate

# 数据校验 + 纯逻辑单元测试（零依赖，无需 npm install）
# 在 push 与 PR 上自动跑，把 CLAUDE.md 里「提交前必须 validate-data.js」变成机器门禁。

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 数据 Schema 校验
        run: node scripts/validate-data.js
      - name: 纯逻辑单元测试
        run: node scripts/test-units.js
