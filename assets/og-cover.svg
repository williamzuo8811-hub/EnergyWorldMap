<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'PingFang SC','Segoe UI',system-ui,sans-serif">
  <defs>
    <radialGradient id="glow1" cx="72%" cy="-10%" r="70%">
      <stop offset="0" stop-color="#21c7ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#21c7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="8%" cy="110%" r="70%">
      <stop offset="0" stop-color="#2ee6a6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#2ee6a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#21c7ff"/>
      <stop offset="1" stop-color="#2ee6a6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#060b18"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- 地球经纬意象 -->
  <g transform="translate(905,315)" fill="none" stroke="#21c7ff" stroke-opacity="0.5" stroke-width="2">
    <circle r="210" stroke-opacity="0.22"/>
    <circle r="210"/>
    <ellipse rx="92" ry="210"/>
    <ellipse rx="168" ry="210" stroke-opacity="0.6"/>
    <line x1="-210" y1="0" x2="210" y2="0"/>
    <path d="M-197 -78 H197 M-197 78 H197 M-150 -150 H150 M-150 150 H150" stroke-opacity="0.5"/>
  </g>
  <!-- 项目散点 -->
  <g>
    <circle cx="820" cy="225" r="8" fill="#2ee6a6"/>
    <circle cx="960" cy="200" r="6" fill="#facc15"/>
    <circle cx="1010" cy="350" r="9" fill="#ff5fa8"/>
    <circle cx="870" cy="430" r="7" fill="#ffb02e"/>
    <circle cx="945" cy="380" r="5" fill="#21c7ff"/>
    <circle cx="900" cy="300" r="6" fill="#b388ff"/>
  </g>

  <!-- 文案 -->
  <text x="90" y="225" fill="#e8eefb" font-size="74" font-weight="800" letter-spacing="2">全球能源项目</text>
  <text x="90" y="320" fill="#e8eefb" font-size="74" font-weight="800" letter-spacing="2">世界地图</text>
  <rect x="92" y="360" width="120" height="6" rx="3" fill="url(#accent)"/>
  <text x="92" y="412" fill="#93a4c4" font-size="30" letter-spacing="3">GLOBAL ENERGY PROJECTS MAP</text>

  <!-- 指标徽标 -->
  <g font-size="26" font-weight="700">
    <g transform="translate(92,470)">
      <rect width="232" height="64" rx="12" fill="#101a30" stroke="#2a3a5c"/>
      <text x="24" y="41" fill="#2ee6a6">2600+ 个项目</text>
    </g>
    <g transform="translate(340,470)">
      <rect width="180" height="64" rx="12" fill="#101a30" stroke="#2a3a5c"/>
      <text x="24" y="41" fill="#21c7ff">10 大品类</text>
    </g>
    <g transform="translate(536,470)">
      <rect width="200" height="64" rx="12" fill="#101a30" stroke="#2a3a5c"/>
      <text x="24" y="41" fill="#ffb02e">8 大区 · 全球</text>
    </g>
  </g>
</svg>
