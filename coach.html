<body>
  <!-- 访问口令门：暂未公开，仅口令访问。校验离线完成，明文不入源码（仅存 SHA-256 / djb2 哈希）。 -->
  <div id="coach-gate" role="dialog" aria-modal="true" aria-label="访问口令">
    <div class="cg-card">
      <div class="cg-logo">🎓</div>
      <div class="cg-title">国际销售话术陪练</div>
      <div class="cg-desc">该模块暂未公开，仅限受邀访问。<br>请输入访问口令。</div>
      <input id="cg-input" class="cg-input" type="password" inputmode="numeric" autocomplete="off" placeholder="访问口令" aria-label="访问口令">
      <button id="cg-btn" class="cg-btn" type="button">进 入</button>
      <div id="cg-err" class="cg-err" role="alert"></div>
    </div>
  </div>
  <script>
    (function(){
      var KEY='coach_access_v1';
      var SHA='7a96764cc44efb32ba02e5ecf68c78740256a25c594e57b1a7972c1a2ecf5677';
      var DJB='e214b24e'; // crypto.subtle 不可用（如 file://）时的离线退回校验
      var gate=document.getElementById('coach-gate'); if(!gate) return;
      var input=document.getElementById('cg-input'),btn=document.getElementById('cg-btn'),err=document.getElementById('cg-err');
      function djb2(s){var h=5381;for(var i=0;i<s.length;i++)h=((h*33)^s.charCodeAt(i))>>>0;return h.toString(16);}
      function toHex(buf){return Array.prototype.map.call(new Uint8Array(buf),function(b){return ('0'+b.toString(16)).slice(-2);}).join('');}
      function unlock(){try{localStorage.setItem(KEY,SHA);}catch(e){}document.documentElement.classList.add('coach-unlocked');}
      function fail(){err.textContent='口令不正确，请重试。';input.value='';input.focus();}
      function verify(v){
        v=(v||'').trim(); if(!v) return;
        if(window.crypto&&crypto.subtle&&location.protocol!=='file:'){
          crypto.subtle.digest('SHA-256',new TextEncoder().encode(v))
            .then(function(buf){toHex(buf)===SHA?unlock():fail();})
            .catch(function(){djb2(v)===DJB?unlock():fail();});
        }else{ djb2(v)===DJB?unlock():fail(); }
      }
      btn.addEventListener('click',function(){verify(input.value);});
      input.addEventListener('keydown',function(e){if(e.key==='Enter')verify(input.value);});
      // 便捷解锁：在受信任设备上访问 coach.html#key=口令，验证后清掉 hash
      try{var m=(location.hash||'').match(/key=([^&]+)/);if(m){verify(decodeURIComponent(m[1]));history.replaceState(null,'',location.pathname+location.search);}}catch(e){}
      if(!document.documentElement.classList.contains('coach-unlocked'))input.focus();
    })();
  </script>
