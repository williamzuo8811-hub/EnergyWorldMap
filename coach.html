<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>国际销售话术陪练 · 全球能源项目 · Sales Sparring Academy</title>
  <meta name="description" content="基于 3,100 个真实全球能源项目的国际销售经理话术陪练系统：8 阶段成交漏斗（情报→破冰→需求→价值→异议→谈判→促成→交付），离线评分 + 黄金话术 + 成长段位，让岗位小白循序渐进升级为资深国际销售经理。">
  <meta name="theme-color" content="#04070f">
  <meta property="og:type" content="website">
  <meta property="og:title" content="国际销售话术陪练 · 全球能源项目">
  <meta property="og:description" content="把 3,100 个真实能源项目变成成交剧本：8 阶段闯关、离线评分、黄金话术、成长段位——小白也能稳扎稳打练成资深国际销售经理。">
  <meta property="og:image" content="assets/og-cover.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="assets/og-cover.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/coach.css?v=1">
</head>
<body>
  <!-- 首屏加载态 -->
  <div class="coach-loader" id="coach-loader">
    <div class="cl-logo">🎓</div>
    <div class="cl-ring"></div>
    <div class="cl-text">国际销售话术陪练<span>装配商机与剧本中 · Loading…</span></div>
  </div>

  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">🎓</div>
      <div>
        <h1>国际销售话术陪练</h1>
        <div class="sub">特锐德出海 · 把真实能源项目从零做到成交 · Sales Sparring Academy</div>
      </div>
    </div>
    <div class="level-wrap" aria-label="成长段位">
      <span class="lvl-icon" id="lvl-icon">🌱</span>
      <div class="lvl-mid">
        <div class="lvl-name" id="lvl-name">见习销售</div>
        <div class="xp-bar"><i id="xp-fill"></i></div>
        <div class="xp-text" id="xp-text">0 XP</div>
      </div>
      <span class="hd-deals" id="hd-deals">成交 0</span>
    </div>
    <div class="top-actions">
      <a class="tbtn" href="index.html" title="返回平面地图">🗺️ 地图</a>
      <a class="tbtn" href="globe.html" title="3D 地球版">🌐 地球</a>
    </div>
  </header>

  <div class="layout">
    <!-- 左侧：模式 + 设置 -->
    <aside class="side" aria-label="模式与设置">
      <div class="block">
        <div class="block-title" id="mode-label">训练模式</div>
        <nav class="mode-tabs" id="mode-tabs" aria-labelledby="mode-label"></nav>
      </div>
      <div class="block">
        <div class="block-title">难度（循序渐进）</div>
        <button class="diff-cycle" id="diff-cycle" title="点击切换难度" aria-label="切换难度：选择题 / 混合 / 全开放 / 自适应">作答方式：<b id="diff-label">混合（推荐）</b><span>▸ 点击切换</span></button>
        <div class="diff-note">选择题最轻松 → 混合 → 全开放话术（高阶）。随时切换，没有压力。</div>
      </div>
      <div class="block">
        <div class="block-title">🤖 AI 自由陪练（可选）</div>
        <button class="ai-toggle" id="ai-toggle" data-act="ai" aria-label="启用或关闭 AI 自由陪练">启用 AI 真人感对练</button>
        <div class="ai-config" id="ai-config" style="display:none">
          <div class="ai-note">离线核心完全可用；如需 AI 不卡词的自由对话，可自备 OpenAI 兼容接口（仅存于本机浏览器，不上传）。</div>
          <input id="ai-base" class="ai-inp" placeholder="API 地址，如 https://api.openai.com/v1">
          <input id="ai-key" class="ai-inp" type="password" placeholder="API Key（sk-…）">
          <input id="ai-model" class="ai-inp" placeholder="模型名，如 gpt-4o-mini">
          <button class="btn-ghost" data-act="ai-save">保存配置</button>
          <div class="ai-chat">
            <div class="ai-log" id="ai-log"></div>
            <div class="ai-send"><input id="ai-input" class="ai-inp" placeholder="对当前商机自由说一句话术…"><button class="btn-primary" data-act="ai-send">发送</button></div>
          </div>
        </div>
      </div>
      <div class="credit">爱思考的杨帆William<span class="mc-by"> · 制作</span></div>
    </aside>

    <!-- 主区：对练台 -->
    <main class="deck" id="deck" role="main" aria-label="对练台"></main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- 数据层（与 index.html 同序，省去 3D 库与英文正文 i18n-en.js）+ 工具层 + 客户元数据 + 陪练内容 + 引擎 -->
  <script defer src="js/data.js"></script>
  <script defer src="js/data-extra.js"></script>
  <script defer src="js/data-brazil.js"></script>
  <script defer src="js/data-mideast.js"></script>
  <script defer src="js/data-russia-ca.js"></script>
  <script defer src="js/data-clients.js"></script>
  <script defer src="js/data-brazil-future.js"></script>
  <script defer src="js/data-saudi-future.js"></script>
  <script defer src="js/data-seasia.js"></script>
  <script defer src="js/data-africa.js"></script>
  <script defer src="js/data-oceania.js"></script>
  <script defer src="js/data-europe.js"></script>
  <script defer src="js/data-nuclear.js"></script>
  <script defer src="js/data-northam.js"></script>
  <script defer src="js/data-southasia.js"></script>
  <script defer src="js/data-china-future.js"></script>
  <script defer src="js/data-clients2.js"></script>
  <script defer src="js/data-refresh2606.js"></script>
  <script defer src="js/progress.js"></script>
  <script defer src="js/util.js"></script>
  <script defer src="js/clients-meta.js"></script>
  <script defer src="js/coach-content.js"></script>
  <script defer src="js/coach.js?v=1"></script>
  <!-- PWA：注册 Service Worker（离线 + 重访秒开）。失败静默。 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
    }
  </script>
</body>
</html>
