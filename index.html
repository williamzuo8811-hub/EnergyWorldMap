<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>全球能源项目世界地图 · Global Energy Projects Map</title>
  <meta name="description" content="可缩放的全球能源项目世界地图：3600+ 个能源与基建项目，按品类 / 大区 / 状态 / 年份筛选，含投资 KPI、容量硬指标、投资热力图、时间轴回放与国别下钻。An interactive world map of 3,600+ global energy &amp; infrastructure projects.">
  <meta name="theme-color" content="#060b18">
  <meta name="author" content="EnergyWorldMap">
  <!-- 社交分享卡（Open Graph / Twitter）：让 🔗 分享视图 的链接在微信/Slack/Twitter 中带标题与预览 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="全球能源项目世界地图 · Global Energy Projects Map">
  <meta property="og:description" content="3600+ 个全球能源与基建项目的交互世界地图：品类 / 大区 / 状态 / 年份筛选，投资 KPI、容量硬指标、热力图、时间轴回放与国别下钻。">
  <meta property="og:image" content="assets/og-cover.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="全球能源项目世界地图 · Global Energy Projects Map">
  <meta name="twitter:description" content="3600+ 个全球能源与基建项目的交互世界地图：筛选、KPI、热力图、时间轴回放与国别下钻。">
  <meta name="twitter:image" content="assets/og-cover.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <!-- 预解析/预连接地图瓦片服务器：缩短首批瓦片的 DNS/TLS 握手（国内默认高德，海外 OSM）-->
  <link rel="preconnect" href="https://webrd01.is.autonavi.com">
  <link rel="dns-prefetch" href="//webrd02.is.autonavi.com">
  <link rel="dns-prefetch" href="//webrd03.is.autonavi.com">
  <link rel="dns-prefetch" href="//webrd04.is.autonavi.com">
  <link rel="dns-prefetch" href="//tile.openstreetmap.org">
  <link rel="stylesheet" href="lib/leaflet.css">
  <link rel="stylesheet" href="lib/MarkerCluster.css">
  <link rel="stylesheet" href="lib/MarkerCluster.Default.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- 首屏加载态：地图瓦片就绪后淡出 -->
  <div class="app-loader" id="app-loader">
    <div class="al-logo">🌐</div>
    <div class="al-spin"></div>
    <div class="al-text">全球能源项目世界地图<span>加载中 · Loading…</span></div>
  </div>
  <div class="app">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">🌐</div>
        <div>
          <h1>全球能源项目世界地图</h1>
          <div class="sub"><span class="sub-en">GLOBAL ENERGY PROJECTS · </span><span id="last-updated">数据更新</span></div>
        </div>
      </div>
      <button class="btn-lang btn-lang-top" id="btn-lang" title="中文 / English" aria-label="切换中文 / English">EN</button>
      <button class="kpi-toggle" id="kpi-toggle" aria-label="展开 / 收起关键数据" aria-expanded="false"><span class="kt-ico">📊</span><span class="kt-txt" data-i18n="Data">数据</span><span class="kt-car">▾</span></button>
      <div class="kpis">
        <div class="kpi"><div class="num accent" id="kpi-proj">0</div><div class="lab" data-i18n="Projects">项目总数</div></div>
        <div class="kpi"><div class="num" id="kpi-country">0</div><div class="lab" data-i18n="Countries">覆盖国家/地区</div></div>
        <div class="kpi"><div class="num good" id="kpi-inv">0</div><div class="lab" data-i18n="Investment (USD)">总投资(美元)</div></div>
        <div class="kpi"><div class="num warn" id="kpi-recent">0</div><div class="lab" data-i18n="🆕 Latest">🆕 最新动态</div></div>
      </div>
    </header>

    <div class="main">
      <!-- 左侧：筛选 -->
      <aside class="side left" aria-label="筛选面板">
        <button class="drawer-close" data-i18n="✕ Close" aria-label="关闭筛选面板">✕ 收起筛选</button>
        <div class="search">
          <span class="ico">🔍</span>
          <input id="search" type="text" placeholder="搜索项目 / 国家 / 业主，支持拼音…" aria-label="搜索项目 / 国家 / 业主，支持拼音与首字母">
        </div>

        <button class="recent-toggle" id="recent-toggle" aria-pressed="false" data-i18n="🆕 Latest updates only">🆕 仅看最新动态</button>

        <!-- ⭐ 我的关注：收藏存在本浏览器（localStorage）；⤓/⤒ 备份恢复 JSON 可跨设备迁移 -->
        <div class="fav-row">
          <button class="fav-toggle" id="fav-toggle" aria-pressed="false" title="只看我收藏的项目（详情卡点 ☆ 收藏）"><span data-i18n="⭐ My favorites">⭐ 我的关注</span><span class="fc" id="fav-count">0</span></button>
          <button class="fav-io" id="fav-export" title="备份收藏（下载 JSON）" aria-label="备份收藏为 JSON">⤓</button>
          <button class="fav-io" id="fav-import" title="恢复收藏（导入 JSON，与现有合并）" aria-label="从 JSON 恢复收藏">⤒</button>
        </div>

        <div class="block">
          <div class="block-title"><span data-i18n="Categories">能源品类</span> <span class="count" data-i18n="click to toggle">点击切换显示</span></div>
          <div class="cat-list" id="cat-list"></div>
        </div>

        <div class="block">
          <div class="block-title" data-i18n="Region">所属大区</div>
          <div class="chip-row" id="region-chips"></div>
        </div>

        <div class="block">
          <div class="block-title" data-i18n="Status">项目状态</div>
          <div class="chip-row" id="status-chips"></div>
        </div>

        <div class="block">
          <div class="block-title"><span data-i18n="Year range">年份区间</span> <span class="count" id="year-label">全部</span></div>
          <div class="year-presets">
            <button class="yp on" data-preset="all" aria-pressed="true" data-i18n="All">全部</button>
            <button class="yp" data-preset="recent" aria-pressed="false" data-i18n="🆕 Latest">🆕 最新</button>
            <button class="yp" data-preset="future" aria-pressed="false" data-i18n="Future 2027+">未来管线 2027+</button>
          </div>
          <div class="year-wrap">
            <div class="year-val"><b id="year-min-lab">2024</b><span>—</span><b id="year-max-lab">2036</b></div>
            <div class="range-dual">
              <div class="rd-track"></div>
              <div class="rd-fill" id="rd-fill"></div>
              <input id="year-min" type="range" min="2024" max="2036" step="1" value="2024">
              <input id="year-max" type="range" min="2024" max="2036" step="1" value="2036">
            </div>
          </div>
          <button class="btn-play" id="btn-play" aria-pressed="false" title="逐年累计揭示，看能源版图如何'长'出来">▶ 播放时间轴</button>
        </div>

        <div class="action-row">
          <button class="btn-act" id="btn-share" title="复制当前筛选视图的分享链接" data-i18n="🔗 Share">🔗 分享</button>
          <button class="btn-act" id="btn-export" title="导出当前筛选结果为 CSV" data-i18n="⤓ CSV">⤓ CSV</button>
          <button class="btn-act" id="btn-snapshot" title="导出当前视图为信息图快照 (SVG)" data-i18n="📸 Snapshot">📸 快照</button>
        </div>
        <button class="btn-reset" id="btn-reset" data-i18n="↺ Reset all filters">↺ 重置全部筛选</button>
      </aside>

      <!-- 中间：地图 -->
      <section class="map-wrap">
        <div id="map" role="region" aria-label="全球能源项目地图"></div>
        <div class="year-ticker" id="year-ticker"></div>
        <div class="cat-legend" id="cat-legend"></div>
        <div class="detail" id="detail" role="region" aria-label="项目详情"></div>
        <div class="country-backdrop" id="country-backdrop"></div>
        <div class="country-panel" id="country-panel" role="dialog" aria-modal="true" aria-label="数据看板"></div>
        <div class="map-tools" role="toolbar" aria-label="地图工具">
          <button class="tools-toggle" id="tools-toggle" aria-label="展开 / 收起地图工具" aria-expanded="false" title="地图工具">⋯</button>
          <div class="basemap-switch" id="basemap-switch" role="group" aria-label="底图切换"></div>
          <a class="btn-globe3d" id="btn-globe3d" href="globe.html" title="3D 地球版：投资挤出柱 + 跨境弧线" aria-label="打开 3D 地球版" data-i18n="🌐 3D Globe">🌐 3D 地球</a>
          <button class="btn-story" id="btn-story" title="导览·故事模式：沙特2030 / AI算力竞赛 / 非洲走廊… 逐站飞行配解说" aria-label="打开导览故事模式" data-i18n="📖 Tours">📖 导览</button>
          <!-- 🎓 销售陪练入口：暂未公开，仅口令访问（去掉 hidden + display:none 即可重新公开） -->
          <a class="btn-coach" id="btn-coach" href="coach.html" hidden style="display:none" title="国际销售话术陪练：用真实项目把生意从零练到成交" aria-label="打开国际销售话术陪练" data-i18n="🎓 Sales Coach">🎓 销售陪练</a>
          <button class="btn-heat" id="btn-heat" aria-pressed="false" title="按当前权重显示宏观热力格局" aria-label="切换投资热力图" data-i18n="🔥 Heatmap">🔥 热力图</button>
          <button class="btn-choro" id="btn-choro" aria-pressed="false" title="按国家聚合投资/装机，整国面填色（点国家看下钻）" aria-label="切换国别染色" data-i18n="🎨 Choropleth">🎨 国别染色</button>
          <button class="btn-weight" id="btn-weight" aria-pressed="false" title="圆点大小与热力按 投资额 或 装机容量(MW) 加权" aria-label="切换加权口径：投资额或装机容量">⚖️ 投资权重</button>
          <button class="btn-flow on" id="btn-flow" aria-pressed="true" title="显隐输变电/高铁/管道飞线" aria-label="显隐飞线" data-i18n="⚡ Flowlines">⚡ 飞线</button>
          <button class="btn-league" id="btn-league" title="企业 / 业主全球排行榜" aria-label="打开企业排行榜" data-i18n="🏢 Companies">🏢 企业榜</button>
          <button class="btn-board" id="btn-board" title="国际大客户 BD 看板（按梯队 / 产品契合 / 海外场景）" aria-label="打开国际大客户 BD 看板" data-i18n="🎯 Clients">🎯 客户</button>
          <button class="btn-compare" id="btn-compare" title="多国能源组合并排对比" aria-label="打开国别对比" data-i18n="🆚 Compare">🆚 对比</button>
          <button class="btn-trends" id="btn-trends" title="按当前筛选看时间维度：年度投资/项目数 + 大区×品类矩阵" aria-label="打开趋势统计" data-i18n="📈 Trends">📈 趋势</button>
          <button class="btn-home" id="btn-home" title="复位视图" aria-label="复位地图视图" data-i18n="⤢ Reset">⤢ 复位</button>
        </div>
        <!-- 📖 导览解说条（故事模式时显示在地图底部居中） -->
        <div class="story-card" id="story-card" role="region" aria-label="导览解说"></div>
        <div class="heat-facets" id="heat-facets"></div>
        <div class="heat-legend" id="heat-legend">
          <span class="hl-cap">投资热力</span>
          <i class="hl-bar"></i>
          <span class="hl-lo">低</span><span class="hl-hi">高</span>
        </div>
        <div class="heat-legend choro-legend" id="choro-legend">
          <span class="hl-cap">国别投资</span>
          <i class="hl-bar"></i>
          <span class="hl-lo">低</span><span class="hl-hi">高</span>
        </div>
        <div class="map-hint" data-i18n="Scroll to zoom · drag to pan · click a project for details · dot size ≈ investment · pulse = country headline · 🆕 = latest">滚轮缩放看省/市 · 拖拽平移 · 点击项目看详情 · 圆点大小≈投资 · 脉冲=各国旗舰 · 🆕=最新动态</div>
        <div class="map-credit" aria-label="制作者署名">爱思考的杨帆William<span class="mc-by">制作</span></div>
      </section>

      <!-- 右侧：统计 -->
      <aside class="side right" aria-label="统计面板">
        <button class="drawer-close" data-i18n="✕ Close" aria-label="关闭统计面板">✕ 收起统计</button>
        <div class="block">
          <div class="block-title"><span data-i18n="Hard metrics">硬指标</span> <span class="count" data-i18n="current filter · from capacity">按当前筛选 · 解析自容量</span></div>
          <div class="cap-stats" id="cap-stats"></div>
        </div>
        <div class="block">
          <div class="block-title" data-i18n="By category">分类分布</div>
          <div id="cat-bars"></div>
        </div>
        <div class="block">
          <div class="block-title" data-i18n="By region">区域分布</div>
          <div class="region-grid" id="region-grid"></div>
        </div>
        <div class="block">
          <div class="block-title"><span data-i18n="Top projects">重点项目 TOP</span> <span class="count sort-toggle" id="sort-toggle" title="点击切换排序口径">按投资额 ⇄</span></div>
          <div class="proj-list" id="proj-list"></div>
        </div>
      </aside>
    </div>

    <!-- 移动端：调出左右面板的浮动按钮 + 抽屉遮罩（仅窄屏显示）-->
    <button class="mobile-fab fab-left" id="fab-filters" aria-label="打开筛选面板" data-i18n="🔍 Filters">🔍 筛选</button>
    <button class="mobile-fab fab-right" id="fab-stats" aria-label="打开统计面板" data-i18n="📊 Stats">📊 统计</button>
    <div class="drawer-backdrop" id="drawer-backdrop"></div>
  </div>

  <script defer src="lib/leaflet.js"></script>
  <script defer src="lib/leaflet.markercluster.js"></script>
  <script defer src="lib/leaflet-heat.js"></script>
  <script defer src="js/data.js"></script>
  <script defer src="js/data-extra.js"></script>
  <script defer src="js/data-brazil.js"></script>
  <script defer src="js/data-mideast.js"></script>
  <script defer src="js/data-russia-ca.js"></script>
  <script defer src="js/data-clients.js"></script>
  <script defer src="js/data-brazil-future.js"></script>
  <script defer src="js/data-saudi-future.js"></script>
  <script defer src="js/data-seasia.js"></script>
  <script defer src="js/data-africa.js"></script>
  <script defer src="js/data-oceania.js"></script>
  <script defer src="js/data-europe.js"></script>
  <script defer src="js/data-nuclear.js"></script>
  <script defer src="js/data-northam.js"></script>
  <script defer src="js/data-southasia.js"></script>
  <script defer src="js/data-china-future.js"></script>
  <script defer src="js/data-clients2.js"></script>
  <script defer src="js/data-refresh2606.js"></script>
  <script defer src="js/data-refresh2606b.js"></script>
  <script defer src="js/data-refresh2606c.js"></script>
  <script defer src="js/progress.js"></script>
  <!-- 拼音字表（~17KB，scripts/build-pinyin.js 生成）：搜索框拼音/首字母匹配用 -->
  <script defer src="js/pinyin-map.js"></script>
  <!-- 📖 导览剧本（故事模式数据；步骤 id 由 validate-data.js 校验） -->
  <script defer src="js/stories.js"></script>
  <!-- i18n-en.js（英文正文 ~1.4MB）不在此同步加载：只有英文详情卡正文用得到（英文名/标签均已内联），
       改由 app.js 在切到英文 / 带 ?lang=en 深链时按需注入，避免拖慢中文访客首屏可交互时间。 -->
  <script defer src="js/util.js"></script>
  <script defer src="js/clients-meta.js"></script>
  <script defer src="js/app.js"></script>
  <!-- PWA：注册 Service Worker（离线 + 重访秒开）。失败静默，不影响纯静态站点。 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
    }
  </script>
  <!-- 轻量访问统计（Cloudflare Web Analytics：免费、无 Cookie、不采集个人数据）。
       启用：Cloudflare 仪表盘 → Analytics & Logs → Web Analytics → Add a site 获取 token，
       替换下方 YOUR_CF_TOKEN 并取消注释（三个页面同此操作）。详见 docs/部署与中国访问.md「五、访问统计」。
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "YOUR_CF_TOKEN"}'></script>
  -->
</body>
</html>
