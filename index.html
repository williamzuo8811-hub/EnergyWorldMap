<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球能源项目世界地图 · Global Energy Projects Map</title>
  <meta name="description" content="可缩放的全球能源项目世界地图：2600+ 个能源与基建项目，按品类 / 大区 / 状态 / 年份筛选，含投资 KPI、容量硬指标、投资热力图、时间轴回放与国别下钻。An interactive world map of 2,600+ global energy &amp; infrastructure projects.">
  <meta name="theme-color" content="#060b18">
  <meta name="author" content="EnergyWorldMap">
  <!-- 社交分享卡（Open Graph / Twitter）：让 🔗 分享视图 的链接在微信/Slack/Twitter 中带标题与预览 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="全球能源项目世界地图 · Global Energy Projects Map">
  <meta property="og:description" content="2600+ 个全球能源与基建项目的交互世界地图：品类 / 大区 / 状态 / 年份筛选，投资 KPI、容量硬指标、热力图、时间轴回放与国别下钻。">
  <meta property="og:image" content="assets/og-cover.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="全球能源项目世界地图 · Global Energy Projects Map">
  <meta name="twitter:description" content="2600+ 个全球能源与基建项目的交互世界地图：筛选、KPI、热力图、时间轴回放与国别下钻。">
  <meta name="twitter:image" content="assets/og-cover.svg">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="lib/leaflet.css">
  <link rel="stylesheet" href="lib/MarkerCluster.css">
  <link rel="stylesheet" href="lib/MarkerCluster.Default.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">🌐</div>
        <div>
          <h1>全球能源项目世界地图</h1>
          <div class="sub">GLOBAL ENERGY PROJECTS · <span id="last-updated">数据更新</span></div>
        </div>
      </div>
      <div class="kpis">
        <div class="kpi"><div class="num accent" id="kpi-proj">0</div><div class="lab" data-i18n="Projects">项目总数</div></div>
        <div class="kpi"><div class="num" id="kpi-country">0</div><div class="lab" data-i18n="Countries">覆盖国家/地区</div></div>
        <div class="kpi"><div class="num good" id="kpi-inv">0</div><div class="lab" data-i18n="Investment (USD)">总投资(美元)</div></div>
        <div class="kpi"><div class="num warn" id="kpi-recent">0</div><div class="lab" data-i18n="🆕 Recent (12mo)">🆕 近一年动态</div></div>
      </div>
    </header>

    <div class="main">
      <!-- 左侧：筛选 -->
      <aside class="side left" aria-label="筛选面板">
        <button class="drawer-close" data-i18n="✕ Close" aria-label="关闭筛选面板">✕ 收起筛选</button>
        <div class="search">
          <span class="ico">🔍</span>
          <input id="search" type="text" placeholder="搜索项目 / 国家 / 业主…" aria-label="搜索项目 / 国家 / 业主">
        </div>

        <button class="recent-toggle" id="recent-toggle" data-i18n="🆕 Recent 12 months only">🆕 仅看最近一年动态</button>

        <div class="block">
          <div class="block-title"><span data-i18n="Categories">能源品类</span> <span class="count" data-i18n="click to toggle">点击切换显示</span></div>
          <div class="cat-list" id="cat-list"></div>
        </div>

        <div class="block">
          <div class="block-title" data-i18n="Region">所属大区</div>
          <div class="chip-row" id="region-chips"></div>
        </div>

        <div class="block">
          <div class="block-title" data-i18n="Status">项目状态</div>
          <div class="chip-row" id="status-chips"></div>
        </div>

        <div class="block">
          <div class="block-title"><span data-i18n="Year range">年份区间</span> <span class="count" id="year-label">全部</span></div>
          <div class="year-presets">
            <button class="yp on" data-preset="all" data-i18n="All">全部</button>
            <button class="yp" data-preset="recent" data-i18n="🆕 Recent">🆕 近一年</button>
            <button class="yp" data-preset="future" data-i18n="Future 2027+">未来管线 2027+</button>
          </div>
          <div class="year-wrap">
            <div class="year-val"><b id="year-min-lab">2012</b><span>—</span><b id="year-max-lab">2035</b></div>
            <div class="range-dual">
              <div class="rd-track"></div>
              <div class="rd-fill" id="rd-fill"></div>
              <input id="year-min" type="range" min="2012" max="2035" step="1" value="2012">
              <input id="year-max" type="range" min="2012" max="2035" step="1" value="2035">
            </div>
          </div>
          <button class="btn-play" id="btn-play" title="逐年累计揭示，看能源版图如何'长'出来">▶ 播放时间轴</button>
        </div>

        <div class="action-row">
          <button class="btn-act" id="btn-share" title="复制当前筛选视图的分享链接" data-i18n="🔗 Share view">🔗 分享视图</button>
          <button class="btn-act" id="btn-export" title="导出当前筛选结果为 CSV" data-i18n="⤓ Export CSV">⤓ 导出CSV</button>
        </div>
        <button class="btn-reset" id="btn-reset" data-i18n="↺ Reset all filters">↺ 重置全部筛选</button>
      </aside>

      <!-- 中间：地图 -->
      <section class="map-wrap">
        <div id="map" role="region" aria-label="全球能源项目地图"></div>
        <div class="year-ticker" id="year-ticker"></div>
        <div class="cat-legend" id="cat-legend"></div>
        <div class="detail" id="detail"></div>
        <div class="country-backdrop" id="country-backdrop"></div>
        <div class="country-panel" id="country-panel"></div>
        <div class="map-tools" role="toolbar" aria-label="地图工具">
          <div class="basemap-switch" id="basemap-switch" role="group" aria-label="底图切换"></div>
          <button class="btn-heat" id="btn-heat" title="按当前权重显示宏观热力格局" aria-label="切换投资热力图" data-i18n="🔥 Heatmap">🔥 热力图</button>
          <button class="btn-weight" id="btn-weight" title="圆点大小与热力按 投资额 或 装机容量(MW) 加权" aria-label="切换加权口径：投资额或装机容量">⚖️ 投资权重</button>
          <button class="btn-flow on" id="btn-flow" title="显隐输变电/高铁/管道飞线" aria-label="显隐飞线" data-i18n="⚡ Flowlines">⚡ 飞线</button>
          <button class="btn-league" id="btn-league" title="企业 / 业主全球排行榜" aria-label="打开企业排行榜" data-i18n="🏢 Companies">🏢 企业榜</button>
          <button class="btn-lang" id="btn-lang" title="中文 / English" aria-label="切换中文 / English">EN</button>
          <button class="btn-home" id="btn-home" title="复位视图" aria-label="复位地图视图" data-i18n="⤢ Reset">⤢ 复位</button>
        </div>
        <div class="heat-legend" id="heat-legend">
          <span class="hl-cap">投资热力</span>
          <i class="hl-bar"></i>
          <span class="hl-lo">低</span><span class="hl-hi">高</span>
        </div>
        <div class="map-hint" data-i18n="Scroll to zoom · drag to pan · click a project for details · dot size ≈ investment · pulse = flagship · 🆕 = last 12 months">滚轮缩放看省/市 · 拖拽平移 · 点击项目看详情 · 圆点大小≈投资 · 脉冲=旗舰 · 🆕=近一年</div>
      </section>

      <!-- 右侧：统计 -->
      <aside class="side right" aria-label="统计面板">
        <button class="drawer-close" data-i18n="✕ Close" aria-label="关闭统计面板">✕ 收起统计</button>
        <div class="block">
          <div class="block-title"><span data-i18n="Hard metrics">硬指标</span> <span class="count" data-i18n="current filter · from capacity">按当前筛选 · 解析自容量</span></div>
          <div class="cap-stats" id="cap-stats"></div>
        </div>
        <div class="block">
          <div class="block-title" data-i18n="By category">分类分布</div>
          <div id="cat-bars"></div>
        </div>
        <div class="block">
          <div class="block-title" data-i18n="By region">区域分布</div>
          <div class="region-grid" id="region-grid"></div>
        </div>
        <div class="block">
          <div class="block-title"><span data-i18n="Top projects">重点项目 TOP</span> <span class="count sort-toggle" id="sort-toggle" title="点击切换排序口径">按投资额 ⇄</span></div>
          <div class="proj-list" id="proj-list"></div>
        </div>
      </aside>
    </div>

    <!-- 移动端：调出左右面板的浮动按钮 + 抽屉遮罩（仅窄屏显示）-->
    <button class="mobile-fab fab-left" id="fab-filters" aria-label="打开筛选面板" data-i18n="🔍 Filters">🔍 筛选</button>
    <button class="mobile-fab fab-right" id="fab-stats" aria-label="打开统计面板" data-i18n="📊 Stats">📊 统计</button>
    <div class="drawer-backdrop" id="drawer-backdrop"></div>
  </div>

  <script src="lib/leaflet.js"></script>
  <script src="lib/leaflet.markercluster.js"></script>
  <script src="lib/leaflet-heat.js"></script>
  <script src="js/data.js"></script>
  <script src="js/data-extra.js"></script>
  <script src="js/data-brazil.js"></script>
  <script src="js/data-mideast.js"></script>
  <script src="js/data-russia-ca.js"></script>
  <script src="js/data-clients.js"></script>
  <script src="js/data-brazil-future.js"></script>
  <script src="js/data-saudi-future.js"></script>
  <script src="js/data-seasia.js"></script>
  <script src="js/data-africa.js"></script>
  <script src="js/data-oceania.js"></script>
  <script src="js/data-europe.js"></script>
  <script src="js/data-nuclear.js"></script>
  <script src="js/data-northam.js"></script>
  <script src="js/data-southasia.js"></script>
  <script src="js/data-china-future.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/util.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
